spring:
  application:
    name: dashboard-service
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: dashboard-service-group
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

graphql:
  graphiql:
    enabled: true
    path: /graphql

server:
  port: 8006

management:
  endpoints:
    web:
      exposure:
        include: health,info
