spring:
  application:
    name: budget-service
  datasource:
    url: jdbc:h2:mem:budgetdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
  h2:
    console:
      enabled: true

grpc:
  client:
    aiRecommendationService:
      address: localhost:9005
      negotiation-type: plaintext

server:
  port: 8004
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info
